<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ninja</title>
    <link rel="stylesheet" href="ninja.css">
       
</head>
<body onload="startGame()">
    <h1>GIOCO NINJA</h1>
    <div id="canvas-container"></div>
    <div class="controls">
        <button onmousedown="moveup()" onmouseup="NinjaFermo()">UP</button>
        <div class="middle-row">
            <button onmousedown="moveleft()" onmouseup="NinjaFermo()">LEFT</button>
            <button onmousedown="moveright()" onmouseup="NinjaFermo()">RIGHT</button>
        </div>
        <button onmousedown="movedown()" onmouseup="NinjaFermo()">DOWN</button>
    </div>
    <script src="immagini.js"></script>
    <script src="ninja.js"></script>
</body>
</html>
